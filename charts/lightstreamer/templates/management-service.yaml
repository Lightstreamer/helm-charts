{{- if (.Values.management.jmx.service).enabled }}
{{- /*
Validation: at least one JMX connector must be enabled when the management
Service is requested, otherwise the Service would have no ports.
*/}}
{{- $hasRmi := and (.Values.management.jmx.rmiConnector).enabled ((.Values.management.jmx.rmiConnector).port).value }}
{{- $hasJmxmp := and (.Values.management.jmx.jmxmpConnector).enabled (.Values.management.jmx.jmxmpConnector).port }}
{{- if not (or $hasRmi $hasJmxmp) }}
  {{- fail "management.jmx.service.enabled is true but no JMX connector is enabled. Enable at least one of rmiConnector or jmxmpConnector." }}
{{- end }}
{{- /*
Validation: collect every port that will be exposed by this Service and
check for duplicates. Port values are coerced to int to avoid type-mismatch
errors when values are set via `--set` (which passes numbers as float64).
*/}}
{{- if and $hasRmi $hasJmxmp }}
  {{- $rmiPort := int (.Values.management.jmx.rmiConnector).port.value }}
  {{- $jmxmpPort := int (.Values.management.jmx.jmxmpConnector).port }}
  {{- if eq $rmiPort $jmxmpPort }}
    {{- fail (printf "management.jmx: rmiConnector.port.value (%d) and jmxmpConnector.port (%d) must be different" $rmiPort $jmxmpPort) }}
  {{- end }}
{{- end }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "lightstreamer.management.service.name" . }}
  {{- with .Values.management.jmx.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  labels:
    {{- include "lightstreamer.labels" . | nindent 4 }}
    {{- with .Values.management.jmx.service.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  type: {{ .Values.management.jmx.service.type }}
  ports:
  {{- with (.Values.management.jmx).rmiConnector }}
    {{- if .enabled }}
    {{- $rmiPortValue := int .port.value }}
    - port: {{ $rmiPortValue }}
      targetPort: jmx-port
      protocol: TCP
      name: jmx
    {{- $dataPortValue := (.dataPort).value | default $rmiPortValue | int }}
    {{- if ne $dataPortValue $rmiPortValue }}
    - port: {{ $dataPortValue }}
      targetPort: jmx-data-port
      protocol: TCP
      name: jmx-data
    {{- end }}
    {{- end }}
  {{- end }}
  {{- with (.Values.management.jmx).jmxmpConnector }}
    {{- if .enabled }}
    - port: {{ .port }}
      targetPort: jmxmp-port
      protocol: TCP
      name: jmxmp
    {{- end }}
  {{- end }}
  selector:
    {{- include "lightstreamer.selectorLabels" . | nindent 4 }}
    {{- with .Values.service.additionalSelectors }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}
